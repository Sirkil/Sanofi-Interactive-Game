<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mobile-container" id="app-container">
        
        <div id="color-phase" class="phase-container active">
            <h1>Choose Your Color</h1>
            <div class="color-grid" id="color-grid"></div>
        </div>

        <div id="team-phase" class="phase-container">
            <h1>Choose Your Team</h1>
            <div class="word-grid" id="team-grid"></div>
        </div>

        <div id="gameplay-phase" class="phase-container">
            <h1>Swipe & Select Letter</h1>
            <div class="carousel-container">
                <div class="carousel" id="carousel"></div>
            </div>
        </div>

    </div>

    <div class="toast" id="toast">Letter not found!</div>
    
    <div class="success-overlay" id="success-overlay">
        <div class="giant-letter" id="giant-letter">W</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="mobile.js"></script>
</body>
</html>
