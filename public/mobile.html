<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Controller</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mobile-container">
        
        <div id="selection-phase">
            <h1>Choose your word</h1>
            <div class="word-grid" id="word-grid">
                </div>
        </div>

        <div class="keypad-container" id="gameplay-phase">
            <h1 id="my-word-title">Your Word: </h1>
            <div class="keypad" id="keypad">
                </div>
        </div>

    </div>

    <div class="toast" id="toast">Letter not found!</div>
    
    <div class="success-overlay" id="success-overlay">
        <div class="giant-letter" id="giant-letter">W</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="mobile.js"></script>
</body>
</html>
